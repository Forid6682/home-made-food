<!DOCTYPE html>
<html lang="bn">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1E3A8A">    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাড়ির রান্না - Professional Food Delivery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #000b18;
            --royal-blue: #001f3f;
            --gold: #d4af37;
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f7ef8a 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Noto Sans Bengali', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #002d5a, var(--bg-dark));
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Header & Navigation --- */
        header {
            padding: 1rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }

        .hamburger { cursor: pointer; color: var(--gold); font-size: 1.5rem; transition: 0.3s; }
        .logo { font-weight: 700; color: var(--gold); font-size: 1.3rem; letter-spacing: 1px; }

        /* --- Sidebar Menu --- */
        .sidebar {
            position: fixed; top: 0; left: calc(var(--sidebar-width) * -1);
            width: var(--sidebar-width); height: 100%;
            background: rgba(0, 11, 24, 0.98); backdrop-filter: blur(25px);
            z-index: 2000; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            padding: 80px 20px; border-right: 1px solid var(--glass-border);
        }
        .sidebar.active { left: 0; }
        .sidebar a {
            display: flex; align-items: center; gap: 15px; color: white;
            text-decoration: none; padding: 15px; border-radius: 12px;
            margin-bottom: 10px; transition: 0.3s;
        }
        .sidebar a:hover { background: var(--glass); color: var(--gold); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1999; }

        /* --- Search & Location --- */
        .search-area { padding: 1rem 1.5rem; animation: fadeIn 0.8s ease; }
        .location-badge { font-size: 0.8rem; color: var(--gold); margin-bottom: 10px; display: block; }
        .search-box {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 12px 20px; border-radius: 50px; display: flex; align-items: center;
        }
        .search-box input { background: transparent; border: none; color: white; width: 100%; margin-left: 10px; outline: none; }

        /* --- Categories --- */
        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 10px 1.5rem; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 8px 18px; border-radius: 20px; white-space: nowrap;
            cursor: pointer; transition: 0.3s; color: var(--text-dim); font-size: 0.9rem;
        }
        .cat-btn.active { background: var(--gold-gradient); color: #000; font-weight: 700; border: none; }

        /* --- Food Grid --- */
        .container { padding: 1rem 1.5rem 100px; max-width: 600px; margin: 0 auto; }
        .food-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 24px; overflow: hidden; margin-bottom: 20px;
            transition: 0.3s; position: relative; animation: fadeIn 0.5s ease;
        }
        .food-img { width: 100%; height: 180px; object-fit: cover; }
        .food-content { padding: 1.2rem; }
        .food-price { color: var(--gold); font-weight: 700; font-size: 1.1rem; }
        .btn-add {
            background: var(--gold-gradient); border: none; padding: 8px 18px;
            border-radius: 10px; color: #000; font-weight: 700; cursor: pointer; float: right;
        }

        /* --- Cart Bar (Foodpanda Style) --- */
        .cart-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: var(--gold-gradient);
            padding: 15px 20px; border-radius: 18px; display: none;
            justify-content: space-between; align-items: center; color: #000;
            font-weight: 700; z-index: 1001; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- Cart Modal --- */
        .cart-modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%;
            background: #000b18; border-top: 3px solid var(--gold);
            z-index: 2100; transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1);
            padding: 2rem; border-radius: 30px 30px 0 0; overflow-y: auto;
        }
        .cart-modal.active { bottom: 0; }
        .checkout-btn {
            width: 100%; background: var(--gold-gradient); padding: 15px;
            border-radius: 12px; border: none; font-weight: 700; margin-top: 20px; cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="width: 70px; height: 70px; background: var(--gold-gradient); border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 1.5rem;">F</div>
            <h4>User Name</h4>
        </div>
        <a href="#"><i class="fas fa-home"></i> হোম</a>
        <a href="#"><i class="fas fa-history"></i> পূর্বের অর্ডার</a>
        <a href="#"><i class="fas fa-heart"></i> পছন্দের তালিকা</a>
        <a href="#"><i class="fas fa-wallet"></i> পেমেন্ট মেথড</a>
        <a href="#"><i class="fas fa-headset"></i> হেল্প সেন্টার</a>
        <a href="#" style="color: #ff4d4d; margin-top: 40px;"><i class="fas fa-sign-out-alt"></i> লগআউট</a>
    </nav>

    <header>
        <div class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
        <div class="logo">GHORE BANNA</div>
        <div style="color: var(--gold); font-size: 1.2rem;"><i class="fas fa-shopping-bag"></i></div>
    </header>

    <div class="search-area">
        <span class="location-badge"><i class="fas fa-map-marker-alt"></i> ধানমন্ডি, ঢাকা</span>
        <div class="search-box">
            <i class="fas fa-search" style="color: var(--gold);"></i>
            <input type="text" id="searchInput" placeholder="আপনার পছন্দের খাবার খুঁজুন..." onkeyup="searchFood()">
        </div>
    </div>

    <div class="categories">
        <div class="cat-btn active" onclick="filterCat('All', this)">সব</div>
        <div class="cat-btn" onclick="filterCat('Biryani', this)">বিরিয়ানি</div>
        <div class="cat-btn" onclick="filterCat('Snacks', this)">নাস্তা</div>
        <div class="cat-btn" onclick="filterCat('Dessert', this)">মিষ্টিমুখ</div>
    </div>

    <div class="container">
        <div id="foodGrid">
            </div>
    </div>

    <div class="cart-bar" id="cartBar" onclick="toggleCart()">
        <span><i class="fas fa-shopping-basket"></i> <span id="itemCount">0</span>টি আইটেম</span>
        <span>ভিউ কার্ট • ৳<span id="totalPrice">0</span></span>
    </div>

    <div class="cart-modal" id="cartModal">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2 style="color: var(--gold);">আপনার ব্যাগ</h2>
            <i class="fas fa-times" onclick="toggleCart()" style="font-size: 1.5rem; cursor: pointer;"></i>
        </div>
        <div id="cartDetails">
            </div>
        <div style="border-top: 1px solid var(--glass-border); margin-top: 20px; padding-top: 20px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>সাবটোটাল</span>
                <span id="subtotal">৳০</span>
            </div>
            <div style="display: flex; justify-content: space-between; color: var(--gold); font-weight: 700; font-size: 1.2rem;">
                <span>মোট বিল</span>
                <span id="grandTotal">৳০</span>
            </div>
            <button class="checkout-btn" onclick="confirmOrder()">অর্ডার প্লেস করুন</button>
        </div>
    </div>

    <script>
        // রিয়েল টাইম ডেটা
        const foods = [
            { id: 1, name: 'মোরগ পোলাও (ফুল)', price: 240, cat: 'Biryani', img: 'https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=400' },
            { id: 2, name: 'চিকেন তেহারি', price: 180, cat: 'Biryani', img: 'https://images.unsplash.com/photo-1543339308-43e59d6b73a6?w=400' },
            { id: 3, name: 'স্পেশাল চিকেন মোমো', price: 150, cat: 'Snacks', img: 'https://images.unsplash.com/photo-1534422298391-e4f8c172dddb?w=400' },
            { id: 4, name: 'বিফ কাবাব (২ পিস)', price: 120, cat: 'Snacks', img: 'https://images.unsplash.com/photo-1603360946369-dc9bb6258143?w=400' },
            { id: 5, name: 'মালাই জর্দা', price: 90, cat: 'Dessert', img: 'https://images.unsplash.com/photo-1589119634742-0f5a7d307a0c?w=400' }
        ];

        let cart = [];

        // খাবার প্রদর্শন ফাংশন
        function renderFood(items) {
            const grid = document.getElementById('foodGrid');
            grid.innerHTML = items.map(item => `
                <div class="food-card">
                    <img src="${item.img}" class="food-img">
                    <div class="food-content">
                        <h3>${item.name}</h3>
                        <p style="font-size: 0.8rem; color: var(--text-dim); margin: 5px 0 15px;">স্বাস্থ্যকর ও সম্পূর্ণ ঘরোয়া পরিবেশে তৈরি।</p>
                        <span class="food-price">৳${item.price}</span>
                        <button class="btn-add" onclick="addToCart(${item.id})">Add +</button>
                    </div>
                </div>
            `).join('');
        }

        // হ্যামবার্গার মেনু টগল
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').style.display = 
                document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
        }

        // কার্ট ওপেন/ক্লোজ
        function toggleCart() {
            document.getElementById('cartModal').classList.toggle('active');
        }

        // কার্টে যোগ করা
        function addToCart(id) {
            const item = foods.find(f => f.id === id);
            cart.push(item);
            updateCart();
            document.getElementById('cartBar').style.display = 'flex';
        }

        // কার্ট আপডেট
        function updateCart() {
            document.getElementById('itemCount').innerText = cart.length;
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('totalPrice').innerText = total;
            document.getElementById('subtotal').innerText = '৳' + total;
            document.getElementById('grandTotal').innerText = '৳' + total;

            const cartDetails = document.getElementById('cartDetails');
            cartDetails.innerHTML = cart.map((item, index) => `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: var(--glass); padding: 10px; border-radius: 10px;">
                    <div>
                        <p style="font-weight: 600;">${item.name}</p>
                        <p style="color: var(--gold); font-size: 0.9rem;">৳${item.price}</p>
                    </div>
                    <i class="fas fa-trash-alt" style="color: #ff4d4d; cursor: pointer;" onclick="removeItem(${index})"></i>
                </div>
            `).join('');
        }

        function removeItem(index) {
            cart.splice(index, 1);
            if(cart.length === 0) {
                document.getElementById('cartBar').style.display = 'none';
                toggleCart();
            }
            updateCart();
        }

        // সার্চ এবং ফিল্টার
        function searchFood() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            renderFood(foods.filter(f => f.name.toLowerCase().includes(query)));
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(cat === 'All') renderFood(foods);
            else renderFood(foods.filter(f => f.cat === cat));
        }

        function confirmOrder() {
            alert("ধন্যবাদ! আপনার অর্ডারটি সফলভাবে গ্রহণ করা হয়েছে।");
            cart = [];
            updateCart();
            toggleCart();
            document.getElementById('cartBar').style.display = 'none';
        }

        // ইনিশিয়াল লোড
        renderFood(foods);
    </script>
    <script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js')
  .then(function() {
    console.log("Service Worker Registered");
  });
}
    </script>
</body>
</html>
