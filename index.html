<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghore Banna - Luxury Food Delivery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #000b18;
            --royal-blue: #001f3f;
            --gold: #d4af37;
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f7ef8a 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Noto Sans Bengali', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #002d5a, var(--bg-dark));
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            padding: 1rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo { font-weight: 700; color: var(--gold); letter-spacing: 1px; font-size: 1.4rem; }

        /* --- Search Bar --- */
        .search-container { padding: 1rem 1.5rem; }
        .search-box {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 12px 20px; border-radius: 50px; display: flex; align-items: center;
        }
        .search-box input {
            background: transparent; border: none; color: white; width: 100%;
            margin-left: 10px; outline: none; font-size: 1rem;
        }

        /* --- Category Filter --- */
        .categories {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 1.5rem;
            scrollbar-width: none;
        }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 8px 20px; border-radius: 20px; white-space: nowrap;
            cursor: pointer; transition: 0.3s; color: var(--text-dim);
        }
        .cat-btn.active { background: var(--gold-gradient); color: #000; font-weight: 700; border: none; }

        /* --- Food Grid --- */
        .container { padding: 1.5rem; max-width: 600px; margin: 0 auto; }
        .food-grid { display: grid; gap: 20px; }

        .food-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            overflow: hidden; transition: 0.3s; position: relative;
        }
        .food-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .food-img { width: 100%; height: 180px; object-fit: cover; }
        .food-content { padding: 1.5rem; }
        .food-price { color: var(--gold); font-weight: 700; font-size: 1.2rem; }
        .badge {
            position: absolute; top: 15px; left: 15px; background: var(--gold-gradient);
            color: #000; padding: 4px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: 700;
        }

        /* --- Buttons --- */
        .btn-add {
            background: var(--gold-gradient); border: none; padding: 10px 20px;
            border-radius: 12px; color: #000; font-weight: 700; cursor: pointer;
            float: right; transition: 0.3s;
        }
        .btn-add:active { transform: scale(0.9); }

        /* --- Floating Cart --- */
        .cart-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: var(--gold-gradient);
            padding: 15px 25px; border-radius: 20px; display: none;
            justify-content: space-between; align-items: center; color: #000;
            font-weight: 700; z-index: 2000; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- Cart Modal --- */
        .modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 80%;
            background: #000b18; border-top: 2px solid var(--gold);
            z-index: 3000; transition: 0.5s; padding: 2rem; border-radius: 30px 30px 0 0;
            overflow-y: auto;
        }
        .modal.active { bottom: 0; }
        .close-modal { float: right; font-size: 1.5rem; color: var(--gold); cursor: pointer; }

    </style>
</head>
<body>

    <header>
        <div class="logo">GHORE BANNA</div>
        <div style="font-size: 1.2rem;"><i class="fas fa-user-circle"></i></div>
    </header>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search" style="color: var(--gold);"></i>
            <input type="text" id="searchInput" placeholder="খাবার খুঁজুন (যেমন: বিরিয়ানি...)" onkeyup="filterFood()">
        </div>
    </div>

    <div class="categories">
        <div class="cat-btn active" onclick="filterCategory('All', this)">সব খাবার</div>
        <div class="cat-btn" onclick="filterCategory('Lunch', this)">দুপুরের খাবার</div>
        <div class="cat-btn" onclick="filterCategory('Snacks', this)">নাস্তা</div>
        <div class="cat-btn" onclick="filterCategory('Dessert', this)">মিষ্টিমুখ</div>
    </div>

    <div class="container">
        <div class="food-grid" id="foodGrid">
            </div>
    </div>

    <div class="cart-bar" id="cartBar" onclick="toggleModal()">
        <span><i class="fas fa-shopping-basket"></i> <span id="itemCount">0</span>টি খাবার</span>
        <span>ভিউ কার্ট • ৳<span id="totalPrice">0</span></span>
    </div>

    <div class="modal" id="cartModal">
        <span class="close-modal" onclick="toggleModal()">&times;</span>
        <h2 style="color: var(--gold); margin-bottom: 1.5rem;">আপনার অর্ডার</h2>
        <div id="cartItems">
            </div>
        <hr style="border: 0.5px solid var(--glass-border); margin: 20px 0;">
        <div style="display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 700;">
            <span>মোট বিল:</span>
            <span>৳<span id="modalTotal">0</span></span>
        </div>
        <button class="btn-add" style="width: 100%; margin-top: 2rem; padding: 18px;" onclick="placeOrder()">অর্ডার কনফার্ম করুন</button>
    </div>

    <script>
        // রিয়েল ডেটাসোর্স (Real-time Food List)
        const foodData = [
            { id: 1, name: 'মোরগ পোলাও স্পেশাল', price: 220, cat: 'Lunch', img: 'https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=400' },
            { id: 2, name: 'বিফ তেহারি', price: 180, cat: 'Lunch', img: 'https://images.unsplash.com/photo-1543339308-43e59d6b73a6?w=400' },
            { id: 3, name: 'চিকেন নাগেটস (৬ পিস)', price: 120, cat: 'Snacks', img: 'https://images.unsplash.com/photo-1562967914-608f82629710?w=400' },
            { id: 4, name: 'হালুয়া ও পরোটা সেট', price: 80, cat: 'Snacks', img: 'https://images.unsplash.com/photo-1606491956689-2ea866880c84?w=400' },
            { id: 5, name: 'কেশর মালাই ফিরনি', price: 90, cat: 'Dessert', img: 'https://images.unsplash.com/photo-1589119634742-0f5a7d307a0c?w=400' }
        ];

        let cart = [];

        // ডাইনামিক খাবার লোড করা
        function displayFood(items) {
            const grid = document.getElementById('foodGrid');
            grid.innerHTML = items.map(item => `
                <div class="food-card">
                    <div class="badge">Healthy</div>
                    <img src="${item.img}" class="food-img">
                    <div class="food-content">
                        <h3 style="margin-bottom: 5px;">${item.name}</h3>
                        <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 15px;">বাড়ির তৈরি টাটকা ও পুষ্টিকর খাবার।</p>
                        <span class="food-price">৳${item.price}</span>
                        <button class="btn-add" onclick="addToCart(${item.id})">Add +</button>
                    </div>
                </div>
            `).join('');
        }

        // ক্যাটাগরি ফিল্টার
        function filterCategory(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(cat === 'All') displayFood(foodData);
            else displayFood(foodData.filter(f => f.cat === cat));
        }

        // সার্চ ফাংশন
        function filterFood() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = foodData.filter(f => f.name.toLowerCase().includes(query));
            displayFood(filtered);
        }

        // কার্ট ফাংশনালিটি
        function addToCart(id) {
            const item = foodData.find(f => f.id === id);
            cart.push(item);
            updateCartUI();
            
            // হ্যাপটিক ভাইব ইমুলেশন
            document.getElementById('cartBar').style.display = 'flex';
        }

        function updateCartUI() {
            document.getElementById('itemCount').innerText = cart.length;
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('totalPrice').innerText = total;
            document.getElementById('modalTotal').innerText = total;

            const cartContainer = document.getElementById('cartItems');
            cartContainer.innerHTML = cart.map((item, index) => `
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>${item.name}</span>
                    <span>৳${item.price} <i class="fas fa-trash" style="color: #ff4d4d; margin-left: 10px; cursor: pointer;" onclick="removeFromCart(${index})"></i></span>
                </div>
            `).join('');
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            if(cart.length === 0) document.getElementById('cartBar').style.display = 'none';
            updateCartUI();
        }

        function toggleModal() {
            document.getElementById('cartModal').classList.toggle('active');
        }

        function placeOrder() {
            alert("ধন্যবাদ! আপনার ৳" + document.getElementById('modalTotal').innerText + " এর অর্ডারটি গ্রহণ করা হয়েছে।");
            cart = [];
            updateCartUI();
            toggleModal();
            document.getElementById('cartBar').style.display = 'none';
        }

        // ইনিশিয়াল লোড
        displayFood(foodData);
    </script>
</body>
</html>
